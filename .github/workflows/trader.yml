name: paper-trader
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python trader.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add position.json
          git diff --staged --quiet && echo "Degisiklik yok." && exit 0
          git commit -m "state"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main && git push && exit 0
            echo "Push denemesi $i basarisiz, tekrar deneniyor..."
            sleep 3
          done
          echo "Push 5 denemede basarisiz oldu."
          exit 1
